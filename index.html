<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Age Calculator</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>

<body> 

  <video autoplay muted loop id="bgVideo">
    <source src="video.mp4" type="video/mp4">
  </video>

  <div class="card"> 

  <div class="content">
   <span class="eyebrow">Welcome..!</span>
    <h1 class="card-title">Age Calculator</h1>

    <div class="field">
      <label for="dob">Your date of birth</label>
      <input type="date"  id="dob" />
  </div>
    </div>

    <button id="btn" class="btn" style="width:100%" >
      Calculate Age
    </button>

    <div class="result-box" id="result">
      <p style="font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:.6rem">
        You are exactly
      </p>

      <div class="big" id="mainAge"></div>
      <div class="sub-row" id="subRow"></div>
      <div class="next-bday" id="nextBday"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
